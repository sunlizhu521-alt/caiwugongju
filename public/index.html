<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>财务工具</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #172033;
      background: #f4f6f9;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      color: #fff;
      background: #14213d;
      border-bottom: 3px solid #1f9d78;
    }
    header strong { font-size: 20px; }
    main { width: min(920px, calc(100% - 32px)); margin: 36px auto; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    .subtitle { margin: 0 0 28px; color: #5c677d; }
    .panel {
      padding: 24px;
      background: #fff;
      border: 1px solid #dfe4ec;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(23, 32, 51, 0.06);
    }
    .status { display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #9aa4b5; }
    .dot.online { background: #1f9d78; }
    .detail { margin: 12px 0 0 20px; color: #667085; }
  </style>
</head>
<body>
  <header><strong>柱哥AI实验室 · 财务工具</strong></header>
  <main>
    <h1>财务工具</h1>
    <p class="subtitle">独立项目环境已经建立，后续财务功能将在这里迭代。</p>
    <section class="panel">
      <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">正在检查服务状态...</span></div>
      <p class="detail" id="statusDetail">连接腾讯云后端服务。</p>
    </section>
  </main>
  <script>
    fetch('/api/health', { cache: 'no-store' })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        document.getElementById('statusDot').classList.add('online');
        document.getElementById('statusText').textContent = '腾讯云服务运行正常';
        document.getElementById('statusDetail').textContent = `服务：${data.service} · 检查时间：${new Date(data.time).toLocaleString()}`;
      })
      .catch((error) => {
        document.getElementById('statusText').textContent = '后端服务暂时不可用';
        document.getElementById('statusDetail').textContent = error.message;
      });
  </script>
</body>
</html>
